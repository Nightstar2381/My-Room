                            <div class="flex flex-col gap-1.5 relative z-[60]"><label class="text-xs font-bold text-stone-400 uppercase pl-1">ประจำเดือน</label>${createDropdownHTML('edit-month', monthOpts, String(record.month).padStart(2, '0'), 'updateEditMonth', 'sky')}</div>
                            <div class="flex flex-col gap-1.5 relative z-[50]"><label class="text-xs font-bold text-stone-400 uppercase pl-1">ปี พ.ศ.</label>${createDropdownHTML('edit-year', yearOpts, record.year, 'updateEditYear', 'sky')}</div>
                        </div>
                        
                        <div class="bg-sky-50 rounded-3xl p-6 border border-sky-100 z-10 relative">
                            <div class="flex justify-between items-center mb-6">
                                <h4 class="font-extrabold text-stone-700 flex items-center gap-2 text-lg"><div class="p-2 bg-sky-50 rounded-xl"><i data-lucide="zap" width="18" class="text-sky-500 fill-sky-500"></i></div> ข้อมูลมิเตอร์ไฟ</h4>
                                <div class="flex items-center gap-2 text-xs bg-white px-3 py-1.5 rounded-xl shadow-sm border border-stone-100"><span class="text-stone-500 font-bold">หน่วยละ</span><input type="number" id="e-rate" value="${record.elecRate}" class="w-14 bg-transparent text-center font-black text-sky-500 outline-none border-b-2 border-stone-100 focus:border-sky-400 transition-colors" oninput="updateEditCalc()"><span class="text-stone-500 font-bold">บ.</span></div>
                            </div>
                            <div class="grid grid-cols-2 gap-4 mb-5">
                                <div><label class="text-xs font-bold text-stone-500 mb-1.5 ml-1 block">จดครั้งก่อน</label><input type="number" id="e-prev" value="${record.elecPrev}" required class="w-full p-4 bg-white rounded-2xl text-stone-700 font-bold focus:ring-4 focus:ring-sky-100 outline-none transition-all duration-300 smooth-expo border border-transparent focus:border-sky-200 shadow-inner" oninput="updateEditCalc()"></div>
                                <div><label class="text-xs font-bold text-stone-500 mb-1.5 ml-1 block">จดครั้งนี้</label><input type="number" id="e-curr" value="${record.elecCurr}" required class="w-full p-4 bg-white rounded-2xl text-stone-700 font-bold focus:ring-4 focus:ring-sky-100 outline-none transition-all duration-300 smooth-expo border border-transparent focus:border-sky-200 shadow-inner" oninput="updateEditCalc()"></div>
                            </div>
                            <div class="bg-sky-50/50 rounded-2xl p-4 flex flex-wrap justify-between items-center gap-2 border border-sky-100/50">
                                <div class="text-stone-500 font-bold text-sm">สรุปใช้ไป <span id="e-calc-units" class="text-sky-600 font-black text-xl mx-1">${record.elecUnits}</span> หน่วย</div>
                                <div class="text-stone-500 font-bold text-sm flex items-center">ยอดไฟ <span id="e-calc-elec" class="text-sky-500 font-black text-xl ml-2">฿${Number(record.elecTotal).toLocaleString()}</span></div>
                            </div>
                        </div>

                        <div class="bg-gradient-to-r from-teal-50 to-white rounded-[2rem] p-5 border border-teal-100 flex flex-col shadow-sm relative z-10">
                            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-start gap-3 mb-2">
                                <div class="flex items-center gap-3">
                                    <div class="bg-white p-3 rounded-2xl text-teal-400 shadow-sm border border-teal-50"><i data-lucide="droplets" width="24"></i></div>
                                    <div>
                                        <h4 class="font-extrabold text-stone-700 text-lg leading-none">ค่าน้ำประปา</h4>
                                        <div class="flex gap-2 mt-2">
                                            <button type="button" id="btn-e-water-flat" onclick="setEditWaterMode('flat')" class="px-3 py-1 text-[10px] sm:text-xs font-bold uppercase tracking-wider rounded-lg transition-colors ${btnFlatCls}">เหมาจ่าย</button>
                                            <button type="button" id="btn-e-water-meter" onclick="setEditWaterMode('meter')" class="px-3 py-1 text-[10px] sm:text-xs font-bold uppercase tracking-wider rounded-lg transition-colors ${btnMeterCls}">ตามมิเตอร์</button>
                                        </div>
                                    </div>
                                </div>
                                <div id="e-water-flat-section" class="flex items-center gap-2 text-xs bg-white px-3 py-2 rounded-xl shadow-sm border border-teal-100 sm:mt-0 mt-2 ${wFlatHidden}">
                                    <span class="text-stone-500 font-bold">฿</span><input type="number" id="e-water-flat" value="${editState.waterTotal}" class="w-16 bg-transparent text-center font-black text-teal-500 outline-none border-b-2 border-stone-100 focus:border-teal-400 transition-colors" oninput="updateEditCalc()">
                                </div>
                            </div>
                            <div id="e-water-meter-section" class="bg-white rounded-[1.5rem] p-4 border border-teal-100 shadow-sm mt-3 ${wMeterHidden}">
                                <div class="flex justify-between items-center mb-4">
                                    <span class="text-xs font-bold text-stone-500">ข้อมูลมิเตอร์น้ำ</span>
                                    <div class="flex items-center gap-2 text-xs bg-stone-50 px-2 py-1.5 rounded-xl border border-stone-100"><span class="text-stone-500 font-bold">หน่วยละ</span><input type="number" id="e-water-rate" value="${editState.waterRate}" class="w-12 bg-transparent text-center font-black text-teal-500 outline-none border-b-2 border-stone-200 focus:border-teal-400 transition-colors" oninput="updateEditCalc()"><span class="text-stone-500 font-bold">บ.</span></div>
                                </div>
                                <div class="grid grid-cols-2 gap-4 mb-4">
                                    <div><label class="text-[11px] font-bold text-stone-400 mb-1.5 ml-1 block">จดครั้งก่อน</label><input type="number" id="e-water-prev" value="${editState.waterPrev}" placeholder="เช่น 100" class="w-full p-3 bg-stone-50 rounded-xl text-stone-700 font-bold focus:bg-white focus:ring-4 focus:ring-teal-100 outline-none transition-all duration-300 border border-transparent focus:border-teal-200 shadow-inner" oninput="updateEditCalc()"></div>
                                    <div><label class="text-[11px] font-bold text-stone-400 mb-1.5 ml-1 block">จดครั้งนี้</label><input type="number" id="e-water-curr" value="${editState.waterCurr}" placeholder="เช่น 115" class="w-full p-3 bg-stone-50 rounded-xl text-stone-700 font-bold focus:bg-white focus:ring-4 focus:ring-teal-100 outline-none transition-all duration-300 border border-transparent focus:border-teal-200 shadow-inner" oninput="updateEditCalc()"></div>
                                </div>
                                <div class="bg-teal-50/50 rounded-xl p-3 flex justify-between items-center text-sm border border-teal-100/50">
                                    <div><span class="text-teal-600/70 font-bold">ใช้ไป </span><span id="e-calc-water-units" class="font-black text-teal-500 text-lg transition-all mx-1">0</span><span class="text-teal-600/70 font-bold text-xs">หน่วย</span></div>
                                    <div class="text-right flex items-center gap-2"><span class="text-teal-600/70 font-bold">รวมน้ำ </span><span id="e-calc-water-total" class="font-black text-teal-500 text-lg transition-all">฿0</span></div>

                            </div>
                        </div>

                        <div class="flex justify-between items-end bg-pink-50/50 p-5 rounded-[2rem] border border-pink-100 mt-4">
                            <span class="text-stone-500 font-extrabold uppercase tracking-wider text-sm">ยอดสุทธิรวม</span>
                            <span id="e-calc-grand" class="text-4xl font-black text-pink-500 tracking-tight transition-all drop-shadow-sm">฿${Number(record.total).toLocaleString()}</span>
                        </div>

                        <div class="flex flex-col sm:flex-row gap-4 pt-4">
                            <button type="button" onclick="closeModal()" class="w-full sm:flex-1 py-4 sm:py-5 rounded-full font-bold text-stone-500 bg-stone-100 hover:bg-stone-200 active:scale-95 transition-all smooth-expo">ยกเลิก</button>
                            <button type="submit" id="btn-update" class="w-full sm:flex-[2] bg-gradient-to-r from-sky-400 to-sky-500 text-white font-extrabold text-xl py-4 sm:py-5 rounded-full shadow-lg shadow-sky-200 hover:shadow-xl hover:-translate-y-1 active:translate-y-0 active:scale-95 transition-all duration-300 smooth-expo flex justify-center items-center gap-2">
                                <i data-lucide="check-circle-2" width="24"></i> <span id="btn-update-text">บันทึกการแก้ไข</span>
                            </button>
                        </div>
                    </form>
                </div>`;
                lucide.createIcons();
            }
        }

        function updateEditCalc() {
            const prev = Number(document.getElementById('e-prev').value) || 0;
            const curr = Number(document.getElementById('e-curr').value) || 0;
            const rate = Number(document.getElementById('e-rate').value) || 0;
            const elecUnits = curr - prev;
            const elecTot = elecUnits > 0 ? elecUnits * rate : 0;
            
            let waterTot = 0;
            if (editState.waterType === 'flat') {
                const wFlat = document.getElementById('e-water-flat');
                if (wFlat) editState.waterTotal = Number(wFlat.value);
                waterTot = editState.waterTotal || 0;
            } else {
                const wPrev = document.getElementById('e-water-prev'), wCurr = document.getElementById('e-water-curr'), wRate = document.getElementById('e-water-rate');
                if (wPrev) editState.waterPrev = wPrev.value;
                if (wCurr) editState.waterCurr = wCurr.value;
                if (wRate) editState.waterRate = Number(wRate.value);
                
                const wUnits = (Number(editState.waterCurr)||0) - (Number(editState.waterPrev)||0);
                waterTot = wUnits > 0 ? wUnits * editState.waterRate : 0;
                editState.waterTotal = waterTot; 

                const elWUnits = document.getElementById('e-calc-water-units');
                const elWTot = document.getElementById('e-calc-water-total');
                if (elWUnits) elWUnits.innerText = wUnits > 0 ? wUnits : 0;
                if (elWTot) elWTot.innerText = `฿${waterTot.toLocaleString()}`;
            }

            const grandTot = elecTot + waterTot;
            
            document.getElementById('e-calc-units').innerText = elecUnits > 0 ? elecUnits : 0;
            document.getElementById('e-calc-elec').innerText = `฿${elecTot.toLocaleString()}`;
            document.getElementById('e-calc-grand').innerText = `฿${grandTot.toLocaleString()}`;
        }

        async function submitEdit(e, id) {
            e.preventDefault();
            const prev = Number(document.getElementById('e-prev').value);
            const curr = Number(document.getElementById('e-curr').value);
            const rate = Number(document.getElementById('e-rate').value);
            
            if(!prev || !curr) return showCustomAlert("กรุณากรอกหน่วยไฟให้ครบถ้วนนะครับ", "warning");
            const units = curr - prev;
            if(units < 0) return showCustomAlert("หน่วยไฟเดือนนี้ ต้องมากกว่าหน่วยเดือนก่อนนะครับ", "error");

            if (editState.waterType === 'meter') {
                const wPrev = Number(editState.waterPrev), wCurr = Number(editState.waterCurr);
                if(!editState.waterPrev || !editState.waterCurr) return showCustomAlert("กรุณากรอกหน่วยน้ำให้ครบถ้วนนะครับ", "warning");
                if((wCurr - wPrev) < 0) return showCustomAlert("หน่วยน้ำเดือนนี้ ต้องมากกว่าหน่วยเดือนก่อนนะครับ", "error");
            }

            const btn = document.getElementById('btn-update');
            const btnText = document.getElementById('btn-update-text');
            btn.disabled = true; btnText.innerText = 'กำลังอัปเดต...'; btn.classList.add('opacity-70');

            const oldRecord = records.find(r => r.id === id);
            const updatedRecord = {
                ...oldRecord, month: editState.month, year: editState.year,
                elecPrev: prev, elecCurr: curr, elecUnits: units,
                elecRate: rate, elecTotal: units * rate, 
                waterType: editState.waterType,
                waterPrev: editState.waterPrev,
                waterCurr: editState.waterCurr,
                waterRate: editState.waterRate,
                waterTotal: editState.waterTotal, 
                total: (units * rate) + editState.waterTotal,
            };

            await saveRecordToSheet(updatedRecord);
            showCustomAlert('อัปเดตเรียบร้อยครับ!', 'success');
            setTimeout(() => { closeModal(); renderApp(); }, 800);
        }
        
        function handlePrint() {
            if (window.self !== window.top) {
                showCustomAlert("โหมดพิมพ์/PDF อาจทำงานไม่สมบูรณ์เมื่อกดจากในหน้าต่างเล็กๆ นะครับ<br><br>แนะนำให้เซฟโค้ดไปเปิดบนเบราว์เซอร์ Chrome แล้วค่อยกดพิมพ์ครับ", "warning");
            }
            try {
                window.print();
            } catch(e) {
                console.error("Print failed", e);
            }
        }
    </script>
