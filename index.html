<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyRoom Utility Manager</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #FFF8F9;
            color: #44403c;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        /* --- Prevent iOS Safari Auto-Zoom on Inputs --- */
        @supports (-webkit-touch-callout: none) {
            input, select, textarea {
                font-size: 16px !important;
            }
        }
        @media screen and (max-width: 1366px) {
            input, select, textarea {
                font-size: 16px !important;
            }
        }

        /* --- Premium iOS Smoothness --- */
        @keyframes ios-up {
            0% { opacity: 0; transform: translateY(25px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .animate-ios-up { 
            animation: ios-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }
        
        @keyframes ios-pop {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        .animate-ios-pop { 
            animation: ios-pop 0.5s cubic-bezier(0.23, 1, 0.32, 1) forwards; 
        }

        @keyframes ios-fade {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        .animate-ios-fade { 
            animation: ios-fade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }

        .smooth-expo { transition-timing-function: cubic-bezier(0.16, 1, 0.3, 1) !important; }
        .smooth-spring { transition-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1) !important; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Modal Blur */
        .backdrop-blur-xl { backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }

        /* --- Cute Custom Scrollbar for Dropdowns --- */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #fbcfe8; border-radius: 10px; }
        .custom-scrollbar:hover::-webkit-scrollbar-thumb { background-color: #f472b6; }

        /* --- Advanced Camera UI --- */
        @keyframes scan-laser {
            0% { top: 5%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 95%; opacity: 0; }
        }
        .laser-line {
            position: absolute; left: 2%; right: 2%; height: 2px; background: #f472b6;
            box-shadow: 0 0 10px #f472b6, 0 0 20px #f472b6; animation: scan-laser 2.5s infinite linear; z-index: 20;
        }
        
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%;
            background: #f472b6; cursor: pointer; box-shadow: 0 2px 6px rgba(244, 114, 182, 0.5);
        }

        /* --- Print Setup For Report --- */
        @media print {
            body { background-color: white !important; }
            nav, #mobile-fab, .mobile-header, .no-print { display: none !important; }
            #main-content { padding: 0 !important; margin: 0 !important; width: 100% !important; max-width: 100% !important; overflow: visible !important; }
            #report-print-area { width: 100% !important; max-width: 100% !important; box-shadow: none !important; border: none !important; padding: 0 !important; margin: 0 !important; page-break-inside: avoid; }
            .print-break-before { page-break-before: always; }
        }
    </style>
</head>
<body class="selection:bg-pink-200 selection:text-pink-900 overflow-x-hidden opacity-0 transition-opacity duration-500" id="main-body">

    <div id="loader" class="fixed inset-0 bg-[#FFF6F7] z-[999] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="animate-spin text-pink-400 mb-4"><i data-lucide="loader-2" width="40" height="40"></i></div>
        <div class="text-pink-400 font-bold text-lg" id="loader-text">กำลังซิงก์ข้อมูล...</div>
    </div>

    <!-- Desktop Floating User Profile -->
    <div class="hidden lg:flex fixed top-6 right-8 z-40 items-center gap-3 bg-white/90 backdrop-blur-xl px-2 pr-4 py-2 rounded-[2rem] shadow-sm border border-pink-100 animate-ios-up no-print">
        <div class="flex items-center gap-3 group cursor-pointer" onclick="toggleDemoRole()" title="โปรไฟล์ผู้ใช้ (คลิกเพื่อจำลองสลับ Role)">
            <img id="profile-avatar" src="https://api.dicebear.com/7.x/initials/svg?seed=User" onerror="this.src='https://api.dicebear.com/7.x/initials/svg?seed=NA'" alt="Avatar" class="w-10 h-10 rounded-full bg-pink-50 border-2 border-white shadow-sm object-cover">
            <div class="text-right">
                <p id="profile-username" class="text-sm font-extrabold text-stone-700 leading-none group-hover:text-pink-500 transition-colors"></p>
                <p id="profile-role" class="text-[10px] font-bold uppercase mt-0.5"></p>
            </div>
        </div>
        <!-- ปุ่มออกจากระบบ (Logout) -->
        <button onclick="logout(event)" class="ml-2 p-2 bg-rose-50 text-rose-500 rounded-full hover:bg-rose-500 hover:text-white transition-colors duration-300" title="ออกจากระบบ">
            <i data-lucide="log-out" width="16" height="16"></i>
        </button>
    </div>

    <div class="flex flex-col lg:flex-row w-full min-h-screen relative hidden" id="app-container">
        
        <!-- 📱 Mobile Top Header -->
        <div class="lg:hidden flex items-center justify-between bg-white/90 backdrop-blur-xl p-4 sticky top-0 z-[60] border-b border-pink-100 shadow-sm mobile-header animate-ios-fade no-print">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-br from-pink-300 to-pink-400 p-2 rounded-xl text-white shadow-sm">
                    <i data-lucide="sparkles" width="18" height="18"></i>
                </div>
                <div>
                    <h1 class="font-black text-lg tracking-tight text-stone-800 leading-none mt-1">MyRoom</h1>
                    <p class="text-[9px] text-pink-400 font-bold tracking-wider uppercase">Utility Manager</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <img id="mobile-profile-avatar" src="https://api.dicebear.com/7.x/initials/svg?seed=User" onerror="this.src='https://api.dicebear.com/7.x/initials/svg?seed=NA'" class="w-9 h-9 rounded-full bg-pink-50 border-2 border-white shadow-sm object-cover" title="โปรไฟล์ผู้ใช้" onclick="toggleDemoRole()">
                <button onclick="logout(event)" class="p-2 text-rose-500 bg-rose-50 border border-rose-100 rounded-xl active:scale-95 transition-all focus:outline-none" title="ออกจากระบบ">
                    <i data-lucide="log-out" width="20" height="20"></i>
                </button>
                <button onclick="toggleMobileMenu()" class="p-2 text-stone-600 hover:text-pink-500 bg-stone-50 border border-stone-100 rounded-xl active:scale-95 transition-all focus:outline-none">
                    <i data-lucide="menu" width="22" height="22"></i>
                </button>
            </div>
        </div>

        <!-- 🌑 Mobile Menu Backdrop -->
        <div id="mobile-menu-backdrop" onclick="closeMobileMenu()" class="fixed inset-0 bg-stone-900/40 backdrop-blur-sm z-[65] opacity-0 pointer-events-none transition-opacity duration-300 lg:hidden no-print"></div>

        <!-- 🍔 Sidebar Navigation -->
        <nav id="sidebar" class="fixed lg:sticky top-0 left-0 h-screen w-[280px] lg:w-72 bg-white/95 lg:bg-white/80 backdrop-blur-xl border-r border-pink-100/60 flex-shrink-0 flex flex-col justify-start z-[70] transform -translate-x-full lg:translate-x-0 transition-transform duration-500 smooth-expo shadow-2xl lg:shadow-none no-print">
            <div class="p-6 lg:p-8 flex items-center justify-between lg:block animate-ios-up" style="animation-delay: 0s">
                <div class="flex items-center gap-4">
                    <div class="bg-gradient-to-br from-pink-300 to-pink-400 p-3 rounded-2xl text-white shadow-sm shadow-pink-200 transform transition-transform duration-500 hover:scale-110 hover:rotate-3 smooth-spring">
                        <i data-lucide="sparkles" class="text-white"></i>
                    </div>
                    <div>
                        <h1 class="font-bold text-xl tracking-tight text-stone-800">MyRoom</h1>
                        <p class="text-[11px] text-pink-400 font-bold tracking-wider uppercase">Utility Manager</p>
                    </div>
                </div>
                <button onclick="closeMobileMenu()" class="lg:hidden p-2 text-stone-400 hover:text-pink-500 bg-stone-50 rounded-full active:scale-95 transition-all focus:outline-none">
                    <i data-lucide="x" width="20" height="20"></i>
                </button>
            </div>
            
            <div class="flex flex-col px-5 pb-5 gap-2 overflow-y-auto flex-1 no-scrollbar" id="nav-menu">
                <button onclick="changeTab('dashboard')" class="nav-btn active animate-ios-up flex items-center gap-3.5 p-3.5 rounded-2xl transition-all duration-300 smooth-expo active:scale-95 whitespace-nowrap text-sm font-bold bg-pink-100 text-pink-600 shadow-sm shadow-pink-100/50" style="animation-delay: 0.05s" data-tab="dashboard"><i data-lucide="layout-dashboard"></i> <span>ภาพรวม (Dashboard)</span></button>
                <button onclick="changeTab('scanner')" id="nav-scanner" class="nav-btn animate-ios-up flex items-center gap-3.5 p-3.5 rounded-2xl transition-all duration-300 smooth-expo active:scale-95 whitespace-nowrap text-sm font-bold text-stone-400 hover:bg-pink-50 hover:text-pink-500" style="animation-delay: 0.1s" data-tab="scanner"><i data-lucide="camera"></i> <span>บันทึกบิล (Entry)</span></button>
                <button onclick="changeTab('data')" class="nav-btn animate-ios-up flex items-center gap-3.5 p-3.5 rounded-2xl transition-all duration-300 smooth-expo active:scale-95 whitespace-nowrap text-sm font-bold text-stone-400 hover:bg-pink-50 hover:text-pink-500" style="animation-delay: 0.15s" data-tab="data"><i data-lucide="database"></i> <span>ข้อมูล (Database)</span></button>
                <button onclick="changeTab('report')" class="nav-btn animate-ios-up flex items-center gap-3.5 p-3.5 rounded-2xl transition-all duration-300 smooth-expo active:scale-95 whitespace-nowrap text-sm font-bold text-stone-400 hover:bg-pink-50 hover:text-pink-500" style="animation-delay: 0.2s" data-tab="report"><i data-lucide="file-bar-chart"></i> <span>รายงาน (Report)</span></button>
                <button onclick="changeTab('users')" id="nav-users" class="nav-btn animate-ios-up flex items-center gap-3.5 p-3.5 rounded-2xl transition-all duration-300 smooth-expo active:scale-95 whitespace-nowrap text-sm font-bold text-stone-400 hover:bg-pink-50 hover:text-pink-500" style="animation-delay: 0.25s" data-tab="users"><i data-lucide="users"></i> <span>ผู้ใช้งาน (Users)</span></button>
            </div>
        </nav>

        <main class="flex-1 p-4 lg:p-10 xl:p-12 overflow-y-auto w-full pb-24 lg:pb-12" id="main-content"></main>

        <!-- Mobile FAB -->
        <div class="lg:hidden fixed bottom-6 right-6 z-40 animate-ios-up no-print" style="animation-delay: 0.3s" id="mobile-fab">
            <button onclick="changeTab('scanner')" class="bg-pink-400 text-white p-4 rounded-full shadow-lg shadow-pink-200 hover:scale-110 active:scale-90 transition-all duration-300 smooth-expo">
                <i data-lucide="camera" width="26" height="26"></i>
            </button>
        </div>
    </div>

    <!-- General Content Modal -->
    <div id="chart-modal" class="fixed inset-0 z-[100] bg-stone-900/40 backdrop-blur-xl flex items-center justify-center p-4 md:p-10 hidden no-print" onclick="if(event.target === this) closeModal()">
        <div class="bg-white rounded-[3rem] p-6 md:p-12 w-full max-w-6xl max-h-[90vh] overflow-y-auto relative shadow-2xl flex flex-col" id="modal-container" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="absolute top-6 right-6 p-3 bg-stone-100 text-stone-500 rounded-full hover:bg-pink-100 hover:text-pink-500 active:scale-90 transition-all duration-300 smooth-expo z-50 shadow-sm">
                <i data-lucide="x"></i>
            </button>
            <div id="modal-content" class="w-full flex-1"></div>
        </div>
    </div>

    <!-- Custom Alert Modal -->
    <div id="custom-alert-modal" class="fixed inset-0 z-[200] bg-stone-900/60 backdrop-blur-sm flex items-center justify-center p-4 hidden no-print" onclick="if(event.target === this) closeCustomAlert()">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-sm text-center shadow-2xl animate-ios-pop flex flex-col items-center relative border border-white">
            <div id="custom-alert-icon-container"></div>
            <h3 id="custom-alert-title" class="text-2xl font-black text-stone-800 mb-2 tracking-tight"></h3>
            <p id="custom-alert-message" class="text-stone-500 font-medium mb-8 text-sm leading-relaxed"></p>
            <button onclick="closeCustomAlert()" class="w-full bg-stone-800 text-white font-extrabold py-4 rounded-2xl hover:bg-stone-900 active:scale-95 transition-all duration-300 shadow-lg shadow-stone-200">
                รับทราบ
            </button>
        </div>
    </div>

    <!-- Custom Confirm Modal -->
    <div id="custom-confirm-modal" class="fixed inset-0 z-[200] bg-stone-900/60 backdrop-blur-sm flex items-center justify-center p-4 hidden no-print" onclick="if(event.target === this) closeCustomConfirm()">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-w-sm text-center shadow-2xl animate-ios-pop flex flex-col items-center relative border border-white">
            <div class="mx-auto w-20 h-20 flex items-center justify-center rounded-full mb-5 bg-orange-50 border border-orange-100 shadow-inner">
                <i data-lucide="help-circle" class="text-orange-500" width="36" height="36"></i>
            </div>
            <h3 class="text-2xl font-black text-stone-800 mb-2 tracking-tight">ยืนยันการทำรายการ</h3>
            <p id="custom-confirm-message" class="text-stone-500 font-medium mb-8 text-sm leading-relaxed"></p>
            <div class="flex gap-3 w-full">
                <button onclick="closeCustomConfirm()" class="flex-1 bg-stone-100 text-stone-600 font-extrabold py-4 rounded-2xl hover:bg-stone-200 active:scale-95 transition-all duration-300">ยกเลิก</button>
                <button onclick="executeCustomConfirm()" class="flex-1 bg-pink-500 text-white font-extrabold py-4 rounded-2xl hover:bg-pink-600 active:scale-95 transition-all duration-300 shadow-lg shadow-pink-200">ยืนยัน</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 🛑 AUTO LOGOUT ON INACTIVITY
        // ==========================================
        let inactivityTimer;
        const INACTIVITY_TIME = 30 * 60 * 1000; // 30 นาที

        function resetInactivityTimer() {
            clearTimeout(inactivityTimer);
            inactivityTimer = setTimeout(autoLogout, INACTIVITY_TIME);
        }

        function autoLogout() {
            localStorage.removeItem('auth_token');
            localStorage.removeItem('user_info');
            sessionStorage.removeItem('auth_token');
            sessionStorage.removeItem('user_info');
            
            showCustomAlert("เซสชันของคุณหมดอายุเนื่องจากไม่มีการใช้งานเป็นเวลานาน กรุณาเข้าสู่ระบบใหม่", "warning");
            setTimeout(() => {
                window.location.replace('login.html');
            }, 3000);
        }

        // ==========================================
        // 🛑 SCROLL LOCK & CUSTOM MODALS
        // ==========================================
        let activeModals = 0;
        function lockScroll() {
            activeModals++;
            document.body.style.overflow = 'hidden';
        }
        function unlockScroll() {
            activeModals--;
            if (activeModals <= 0) {
                activeModals = 0;
                document.body.style.overflow = '';
            }
        }

        function showCustomAlert(message, type = 'info') {
            const alertModal = document.getElementById('custom-alert-modal');
            const alertMessage = document.getElementById('custom-alert-message');
            const alertTitle = document.getElementById('custom-alert-title');
            const iconContainer = document.getElementById('custom-alert-icon-container');
            
            alertMessage.innerHTML = message;
            
            let iconStr = ''; let titleStr = ''; let colorCls = '';
            if (type === 'error') { 
                iconStr = '<i data-lucide="alert-circle" class="text-rose-500" width="36" height="36"></i>'; 
                titleStr = 'เกิดข้อผิดพลาด!'; 
                colorCls = 'bg-rose-50 border border-rose-100'; 
            } else if (type === 'success') { 
                iconStr = '<i data-lucide="check-circle-2" class="text-teal-500" width="36" height="36"></i>'; 
                titleStr = 'สำเร็จ!'; 
                colorCls = 'bg-teal-50 border border-teal-100'; 
            } else if (type === 'warning') { 
                iconStr = '<i data-lucide="alert-triangle" class="text-amber-500" width="36" height="36"></i>'; 
                titleStr = 'แจ้งเตือน!'; 
                colorCls = 'bg-amber-50 border border-amber-100'; 
            } else { 
                iconStr = '<i data-lucide="info" class="text-sky-500" width="36" height="36"></i>'; 
                titleStr = 'ข้อมูล'; 
                colorCls = 'bg-sky-50 border border-sky-100'; 
            }

            iconContainer.innerHTML = iconStr;
            iconContainer.className = `mx-auto w-20 h-20 flex items-center justify-center rounded-full mb-5 shadow-inner ${colorCls}`;
            alertTitle.innerText = titleStr;

            alertModal.classList.remove('hidden');
            lucide.createIcons();
            lockScroll();
        }

        function closeCustomAlert() {
            document.getElementById('custom-alert-modal').classList.add('hidden');
            unlockScroll();
        }

        let pendingConfirmAction = null;
        function showCustomConfirm(message, actionCallback) {
            pendingConfirmAction = actionCallback;
            document.getElementById('custom-confirm-message').innerHTML = message;
            document.getElementById('custom-confirm-modal').classList.remove('hidden');
            lucide.createIcons();
            lockScroll();
        }

        function closeCustomConfirm() {
            pendingConfirmAction = null;
            document.getElementById('custom-confirm-modal').classList.add('hidden');
            unlockScroll();
        }

        function executeCustomConfirm() {
            if (pendingConfirmAction) pendingConfirmAction();
            closeCustomConfirm();
        }

        // ==========================================
        // 📅 THAI DATE FORMATTER
        // ==========================================
        function formatThaiDate(val) {
            if (!val) return '';
            const d = new Date(val);
            if (isNaN(d.getTime())) return val;
            const months = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear() > 2500 ? d.getFullYear() : d.getFullYear() + 543}`;
        }

        // ==========================================
        // 🎨 AVATAR HELPER
        // ==========================================
        const AVATAR_STYLES = [
            'adventurer',
            'adventurer-v1', 'adventurer-v2', 'adventurer-v3', 'adventurer-v4', 'adventurer-v5', 
            'adventurer-v6', 'adventurer-v7', 'adventurer-v8', 'adventurer-v9', 'adventurer-v10',
            'adventurer-neutral', 
            'avataaars', 'avataaars-neutral',
            'big-ears', 'big-ears-neutral',
            'big-smile',
            'bottts', 'bottts-neutral',
            'croodles', 'croodles-neutral',
            'fun-emoji', 'icons', 'identicon', 'initials',
            'lorelei', 'lorelei-neutral',
            'micah', 'miniavs', 'notionists', 'notionists-neutral',
            'open-peeps', 'personas', 'pixel-art', 'pixel-art-neutral',
            'shapes', 'thumbs'
        ];

        function getAvatarUrl(seed, style = 'adventurer') {
            let actualStyle = style;
            let actualSeed = encodeURIComponent((seed || '').trim());
            
            if (style && style.startsWith('adventurer-v')) {
                actualStyle = 'adventurer';
                actualSeed = encodeURIComponent((seed || '').trim() + '-' + style);
            }
            
            return `https://api.dicebear.com/7.x/${actualStyle}/svg?seed=${actualSeed}&backgroundColor=b6e3f4,ffdfbf,ffd5dc`;
        }

        // ==========================================
        // 🔒 SESSION PROTECTION & INIT
        // ==========================================
        let currentUser = { id: 'u1', username: 'admin', role: 'admin', email: '', avatarStyle: 'adventurer' }; 
        
        const savedUser = localStorage.getItem('user_info') || sessionStorage.getItem('user_info');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            if(!currentUser.email) currentUser.email = '';
            if(!currentUser.avatarStyle) currentUser.avatarStyle = 'adventurer';
        }

        let usersList = [
            { id: 'u1', username: currentUser.username, role: currentUser.role, status: 'active', email: currentUser.email, avatarStyle: currentUser.avatarStyle },
            { id: 'u2', username: 'my_roommate', role: 'user', status: 'active', email: '', avatarStyle: 'fun-emoji' }
        ];

        const authToken = localStorage.getItem('auth_token') || sessionStorage.getItem('auth_token');
        if (!authToken) {
            try {
                if (window.location.protocol === 'blob:' || window.location.protocol === 'data:') {
                    console.log("พรีวิวโหมด: อนุญาตให้เข้าใช้งานหน้าจำลองชั่วคราว");
                    document.getElementById('main-body').classList.remove('opacity-0');
                } else {
                    window.location.replace('login.html'); 
                }
            } catch (e) {
                console.warn(e);
                document.getElementById('main-body').classList.remove('opacity-0');
            }
        } else {
            document.getElementById('main-body').classList.remove('opacity-0');
        }

        function logout(e) {
            e.stopPropagation();
            showCustomConfirm("ต้องการออกจากระบบใช่หรือไม่?", () => {
                localStorage.removeItem('auth_token');
                localStorage.removeItem('user_info');
                sessionStorage.removeItem('auth_token');
                sessionStorage.removeItem('user_info');
                try {
                    if (window.location.protocol === 'blob:' || window.location.protocol === 'data:') {
                        showCustomAlert("ออกจากระบบแล้ว (โหมดพรีวิว)", "success");
                    } else {
                        window.location.replace('login.html');
                    }
                } catch(err) {
                    console.warn(err);
                }
            });
        }

        // ==========================================
        // ⚠️ การตั้งค่า Google Sheets API
        // ==========================================
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzsBn0I4kmtAOH7yrU_rWQbV4QTSokXEUqRRjBYVJ3WPitgV88eoUWxLi5LbljxLTo/exec"; 
        
        const THAI_MONTHS = [

            const ringCol = theme === 'pink' ? 'focus:ring-pink-100' : (theme === 'sky' ? 'focus:ring-sky-100' : 'focus:ring-teal-100');
            const iconCol = theme === 'pink' ? 'text-pink-400' : (theme === 'sky' ? 'text-sky-500' : 'text-teal-500');

            let listItems = options.map(o => {

            }).join('');

                        <ul class="max-h-60 overflow-y-auto custom-scrollbar py-1.5 pb-2">${listItems}</ul>

                if(GOOGLE_SCRIPT_URL.includes("YOUR_APP_SCRIPT_URL")) {
                    records = [

                        { id: '3', month: '03', year: '2569', elecPrev: 1255, elecCurr: 1400, elecUnits: 145, elecRate: 8, elecTotal: 1160, waterType: 'flat', waterPrev: '', waterCurr: '', waterRate: 15, waterTotal: 150, total: 1310, date: '2026-03-25' },
                        { id: '4', month: '04', year: '2569', elecPrev: 1400, elecCurr: 1600, elecUnits: 200, elecRate: 8, elecTotal: 1600, waterType: 'flat', waterPrev: '', waterCurr: '', waterRate: 15, waterTotal: 150, total: 1750, date: '2026-04-25' },
                        { id: '5', month: '03', year: '2568', elecPrev: 800, elecCurr: 900, elecUnits: 100, elecRate: 8, elecTotal: 800, waterType: 'flat', waterPrev: '', waterCurr: '', waterRate: 15, waterTotal: 150, total: 950, date: '2025-03-25' },
                        { id: '6', month: '04', year: '2568', elecPrev: 900, elecCurr: 1050, elecUnits: 150, elecRate: 8, elecTotal: 1200, waterType: 'flat', waterPrev: '', waterCurr: '', waterRate: 15, waterTotal: 150, total: 1350, date: '2025-04-25' }
                    ];
                    return;
                }
                const fetchUrl = GOOGLE_SCRIPT_URL + (GOOGLE_SCRIPT_URL.includes('?') ? '&' : '?') + 'action=getData';
                const res = await fetch(fetchUrl);
                const result = await res.json();
                
                if (result && result.status === 'success' && Array.isArray(result.data)) {
                    // Data Healing: ซ่อมแซมยอดรวมที่หายไปจากปัญหา Column Shift
                    records = result.data.map(r => {
                        let healed = { ...r };
                        if (!healed.date || String(healed.date).trim() === '' || healed.date === 'undefined') {
                            if (healed.waterCurr && String(healed.waterCurr).includes('-')) {
                                healed.date = healed.waterCurr;
                                healed.total = healed.waterPrev;
                                healed.waterTotal = healed.waterType;
                                healed.waterType = 'flat';
                            }
                        }
                        
                        const elecUnits = Number(healed.elecUnits) || (Number(healed.elecCurr) - Number(healed.elecPrev)) || 0;
                        const elecTotal = Number(healed.elecTotal) || (elecUnits * Number(healed.elecRate)) || 0;
                        const waterTotal = Number(healed.waterTotal) || 0;
                        const total = Number(healed.total) || (elecTotal + waterTotal);

                        return {
                            ...healed, 
                            elecUnits, elecTotal, waterTotal, total,
                            waterType: healed.waterType || 'flat',
                            waterPrev: healed.waterPrev || '',
                            waterCurr: healed.waterCurr || '',
                            waterRate: healed.waterRate || 15
                        };
                    });
                } else {
                    records = [];
                    console.warn("Invalid data format received from API", result);
                }
            } catch (err) { 
                console.error("Fetch Error:", err); 
                records = [];
            }
        }

        async function saveRecordToSheet(record) {
            if(GOOGLE_SCRIPT_URL.includes("YOUR_APP_SCRIPT_URL")) {
                const index = records.findIndex(r => r.id === record.id);
                if (index !== -1) records[index] = record; else records.push(record); return; 
            }
            const isUpdate = records.some(r => r.id === record.id);
            const payload = { action: isUpdate ? 'update' : 'save', ...record }; 
            try {
                await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload), headers: { 'Content-Type': 'text/plain;charset=utf-8' } });
                const index = records.findIndex(r => r.id === record.id);
                if (index !== -1) records[index] = record; else records.push(record);
            } catch (err) { showCustomAlert("เกิดข้อผิดพลาดในการบันทึก", "error"); }
        }

        async function deleteRecordFromSheet(id) {
            if(GOOGLE_SCRIPT_URL.includes("YOUR_APP_SCRIPT_URL")) {
                records = records.filter(r => r.id !== id); return;
            }
            try {
                await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', id: id }), headers: { 'Content-Type': 'text/plain;charset=utf-8' } });
                records = records.filter(r => r.id !== id);
            } catch (err) { showCustomAlert("ลบข้อมูลไม่สำเร็จ", "error"); }
        }

        function getDashboardMetrics() {
            const currentYearRecords = records.filter(r => String(r.year) === String(filterYear)).sort((a,b) => a.month - b.month);
            const prevYearRecords = records.filter(r => String(r.year) === String(Number(filterYear) - 1)).sort((a,b) => a.month - b.month);
            
            const dashRecs = currentYearRecords.filter(r => filterMonth === 'all' || String(r.month).padStart(2, '0') === String(filterMonth).padStart(2, '0'));
            
            const totalAmount = dashRecs.reduce((sum, r) => sum + Number(r.total), 0);
            const totalUnits = dashRecs.reduce((sum, r) => sum + Number(r.elecUnits), 0);
            const totalWater = dashRecs.reduce((sum, r) => sum + Number(r.waterTotal), 0);
            const totalElec = dashRecs.reduce((sum, r) => sum + Number(r.elecTotal), 0);
            const elecPercent = totalAmount > 0 ? Math.round((totalElec / totalAmount) * 100) : 0;
            const waterPercent = totalAmount > 0 ? 100 - elecPercent : 0;
            const monthlyAverage = dashRecs.length > 0 ? totalAmount / dashRecs.length : 0;

            let pctChangeAmt = 0, pctChangeUn = 0;
            const targetM = filterMonth !== 'all' ? filterMonth : (currentYearRecords.length > 0 ? currentYearRecords[currentYearRecords.length - 1].month : null);
            if (targetM) {
                const curr = records.find(r => String(r.year) === String(filterYear) && String(r.month).padStart(2, '0') === String(targetM).padStart(2, '0'));
                const prevM = String(Number(targetM) - 1).padStart(2, '0');
                const prev = records.find(r => String(r.year) === String(filterYear) && String(r.month).padStart(2, '0') === prevM);
                if (curr && prev && prev.total > 0) {
                    pctChangeAmt = ((Number(curr.total) - Number(prev.total)) / Number(prev.total)) * 100;
                    pctChangeUn = ((Number(curr.elecUnits) - Number(prev.elecUnits)) / Number(prev.elecUnits)) * 100;
                }
            }

            const chartData = THAI_MONTHS.map(m => {
                const r = currentYearRecords.find(x => String(x.month).padStart(2, '0') === m.val);
                const pr = prevYearRecords.find(x => String(x.month).padStart(2, '0') === m.val);
                return { 
                    month: m.short, fullMonth: m.label, val: m.val, 
                    units: r ? Number(r.elecUnits) : 0, 
                    total: r ? Number(r.total) : 0, 
                    prevTotal: pr ? Number(pr.total) : 0,
                    hasData: !!r, hasPrevData: !!pr,
                    isActive: filterMonth === 'all' || filterMonth === m.val 
                };
            });

            const maxUnits = Math.max(...chartData.map(d => d.units), 10);
            const maxTotal = Math.max(...chartData.map(d => d.total), ...chartData.map(d => d.prevTotal), 10);
            
            const highestMonthData = chartData.find(d => d.total === Math.max(...chartData.map(c => c.total)) && d.hasData);
            const highestMonthVal = highestMonthData ? highestMonthData.val : null;
            const lowestMonthData = chartData.find(d => d.total === Math.min(...chartData.filter(c => c.hasData).map(c => c.total)) && d.hasData);

            let insights = [];
            if (dashRecs.length > 0) {
                if (pctChangeAmt <= -5) {
                    const trees = Math.max(1, Math.round(Math.abs(pctChangeAmt) / 5));
                    insights.push(`เดือนล่าสุดประหยัดกว่าเดือนก่อน ${Math.abs(pctChangeAmt).toFixed(1)}% ช่วยลดการใช้พลังงานได้ดีมาก`);
                } else if (pctChangeAmt >= 5) {
                    insights.push(`เดือนล่าสุดค่าใช้จ่ายเพิ่มขึ้น ${pctChangeAmt.toFixed(1)}% โปรดระมัดระวังการใช้พลังงาน`);
                } else if (pctChangeAmt !== 0) {
                    insights.push(`เดือนล่าสุดค่าใช้จ่ายใกล้เคียงเดิม ถือว่าควบคุมได้ดี`);
                }

                const checkMonth = filterMonth !== 'all' ? filterMonth : (highestMonthData?.val || String(new Date().getMonth() + 1).padStart(2, '0'));
                if (['03', '04', '05'].includes(checkMonth)) {
                    insights.push(`เข้าสู่ช่วงฤดูร้อน แนวโน้มค่าไฟฟ้าอาจสูงขึ้นจากการใช้เครื่องปรับอากาศ`);
                } else if (['11', '12', '01'].includes(checkMonth)) {
                    insights.push(`เข้าสู่ช่วงฤดูหนาว เป็นโอกาสดีในการลดการใช้เครื่องปรับอากาศเพื่อประหยัดค่าไฟ`);
                }

                if (filterMonth === 'all' && lowestMonthData) {
                    insights.push(`ยอดรวมปีนี้ ฿${totalAmount.toLocaleString()} โดยเดือนที่จ่ายน้อยที่สุดคือ ${lowestMonthData.fullMonth} (${lowestMonthData.total}฿)`);
                }
            } else {
                insights.push(`ยังไม่มีข้อมูลการบันทึกบิลในช่างเวลานี้ กรุณาบันทึกข้อมูล`);
            }

            return { dashRecs, totalAmount, totalUnits, totalWater, totalElec, elecPercent, waterPercent, pctChangeAmt, pctChangeUn, chartData, maxUnits, maxTotal, highestMonthVal, highestMonthData, monthlyAverage, insights };
        }

        function getTrendLinePoints(chartData, maxTotal, dataKey = 'total') {
            const svgWidth = 1000, svgHeight = 200, paddingX = 40, stepX = (svgWidth - paddingX * 2) / 11;
            let points = [];
            chartData.forEach((d, i) => { 
                if ((dataKey === 'total' && d.hasData) || (dataKey === 'prevTotal' && d.hasPrevData)) { 
                    const x = paddingX + (i * stepX); 
                    const y = svgHeight - 20 - (d[dataKey] / maxTotal) * (svgHeight - 40); 
                    points.push(`${x},${y}`); 
                } 
            });
            return points.join(' ');
        }

        function getDashboardHTML() {
            const m = getDashboardMetrics();
            let years = [...new Set(records.map(r => String(r.year)))];
            if(!years.includes(String(filterYear))) years.push(String(filterYear));
            const yearOpts = years.sort().reverse().map(y => ({ value: y, label: `ปี พ.ศ. ${y}` }));
            const monthOpts = [{value: 'all', label: 'ดูทุกเดือน'}, ...THAI_MONTHS.map(x => ({ value: x.val, label: x.label }))];

            const insightsHtml = `
            <div class="bg-gradient-to-r from-pink-100 to-amber-50 rounded-[2rem] p-5 md:p-6 shadow-sm border border-white flex flex-col sm:flex-row items-center gap-4 animate-ios-up relative overflow-hidden group" style="animation-delay: 0.25s">
                <div class="absolute -right-10 -top-10 w-40 h-40 bg-white/40 rounded-full blur-3xl"></div>
                <div class="bg-white/80 p-3 md:p-4 rounded-full shadow-sm text-pink-500 z-10 shrink-0 border border-white">
                    <i data-lucide="lightbulb" class="animate-pulse" width="28" height="28"></i>
                </div>
                <div class="z-10 flex-1 w-full text-center sm:text-left">
                    <h4 class="font-extrabold text-stone-700 mb-2 md:mb-3 flex items-center justify-center sm:justify-start gap-2 text-lg">ข้อเสนอแนะอัจฉริยะ</h4>
                    <div class="flex flex-row flex-wrap justify-center sm:justify-start gap-2 md:gap-3">
                        ${m.insights.map(msg => `<div class="bg-white/80 backdrop-blur-sm px-4 py-2 rounded-xl text-xs md:text-sm font-bold text-stone-600 shadow-sm border border-white w-full sm:w-auto text-left flex items-center gap-2"><i data-lucide="check-circle-2" width="14" class="text-teal-500"></i> ${msg}</div>`).join('')}
                    </div>
                </div>
            </div>`;

            const highestMonthHtml = `
            <div class="bg-white p-5 md:p-6 rounded-[2rem] shadow-sm border border-rose-50 flex flex-col justify-between group hover:-translate-y-1 hover:shadow-xl transition-all duration-500 smooth-expo animate-ios-up" style="animation-delay: 0.1s">
                <div class="flex justify-between items-start mb-4">
                    <div class="bg-rose-50 p-2.5 md:p-3 rounded-2xl text-rose-400 group-hover:bg-rose-400 group-hover:text-white transition-colors duration-300">
                        <i data-lucide="flame" width="20" height="20" class="transform group-hover:scale-110 transition-transform duration-300"></i>
                    </div>
                    <div class="text-[10px] md:text-xs font-bold px-2 py-1 rounded-full bg-rose-50 text-rose-500">
                        สูงสุด
                    </div>
                </div>
                <div>
                    <p class="text-[11px] md:text-sm font-bold text-stone-400 mb-1">เดือน ${m.highestMonthData?.fullMonth || '-'}</p>
                    <h3 class="text-2xl md:text-3xl lg:text-4xl font-black text-rose-500 tracking-tight">฿${m.highestMonthData?.total.toLocaleString() || 0}</h3>
                </div>
            </div>`;

            const averageHtml = `
            <div class="bg-gradient-to-br from-sky-100 to-sky-50 p-5 md:p-6 rounded-[2rem] shadow-sm flex flex-col justify-between relative overflow-hidden border border-sky-100/50 group hover:-translate-y-1 hover:shadow-xl transition-all duration-500 smooth-expo animate-ios-up" style="animation-delay: 0.2s">
                <div class="absolute -right-6 -top-6 w-32 h-32 bg-white/40 rounded-full blur-2xl transform group-hover:scale-150 transition-transform duration-700 ease-out"></div>
                <div class="flex justify-between items-start mb-4 relative z-10">
                    <div class="bg-white/60 backdrop-blur-md p-2.5 md:p-3 rounded-2xl text-sky-500 transform group-hover:rotate-12 transition-transform duration-300">
                        <i data-lucide="calculator" width="20" height="20"></i>
                    </div>
                    <div class="text-[10px] md:text-xs font-bold px-2 py-1 rounded-full bg-white/50 text-sky-600 border border-sky-200/50">
                        จาก ${m.dashRecs.length} เดือน
                    </div>
                </div>
                <div class="relative z-10">
                    <p class="text-[11px] md:text-sm font-bold text-sky-600/70 mb-1">เฉลี่ยต่อเดือน</p>
                    <h3 class="text-2xl md:text-3xl lg:text-4xl font-black tracking-tight text-sky-800">฿${Math.round(m.monthlyAverage).toLocaleString()}</h3>
                </div>
            </div>`;

            return `
            <div class="space-y-8 pb-8 pt-14 md:pt-0">
                <header class="flex flex-col gap-6 animate-ios-up relative z-50" style="animation-delay: 0s">
                    <div>
                        <h2 class="text-3xl font-extrabold text-stone-800 tracking-tight flex items-center gap-3"><i data-lucide="layout-dashboard" class="text-pink-500" width="32" height="32"></i> ภาพรวมการใช้งาน</h2>
                        <p class="text-stone-500 mt-1 font-medium">สรุปการใช้พลังงานและค่าใช้จ่าย</p>
                    </div>
                    <div class="inline-flex flex-wrap items-center gap-3 bg-pink-50/50 p-2.5 rounded-[2rem] border border-pink-100 shadow-sm w-fit backdrop-blur-sm">
                        <div class="flex items-center gap-2 pl-3 pr-2 text-pink-400"><i data-lucide="filter" width="18" height="18"></i><span class="text-xs font-bold uppercase tracking-wider hidden sm:block">ตัวกรอง</span></div>
                        <div class="w-40 sm:w-48 relative z-[60]">${createDropdownHTML('dash-year', yearOpts, filterYear, 'updateDashSlicerYear', 'pink', 'calendar-days')}</div>
                        <div class="w-40 sm:w-48 relative z-[50]">${createDropdownHTML('dash-month', monthOpts, filterMonth, 'updateDashSlicerMonth', 'teal', 'calendar')}</div>
                    </div>
                </header>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-5">
                    ${metricCard('ยอดรวมค่าใช้จ่าย', '฿' + m.totalAmount.toLocaleString(), m.pctChangeAmt, 'pink', 'banknote', 0.05)}
                    ${highestMonthHtml}
                    ${metricCard('ค่าไฟฟ้า (' + m.totalUnits.toLocaleString() + ' หน่วย)', '฿' + m.totalElec.toLocaleString(), m.pctChangeUn, 'teal', 'zap', 0.15)}
                    ${averageHtml}
                </div>

                ${insightsHtml}

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="bg-white p-7 rounded-[2.5rem] shadow-sm border border-pink-50 flex flex-col lg:col-span-1 items-center justify-center relative group animate-ios-up hover:shadow-lg transition-shadow duration-500 overflow-hidden" style="animation-delay: 0.3s">
                        <button onclick="openModal('pie')" class="absolute top-6 right-6 p-2.5 bg-pink-50 text-pink-400 rounded-full opacity-0 group-hover:opacity-100 transition-all duration-300 hover:bg-pink-100 hover:scale-110 active:scale-90 z-10" title="ขยายกราฟ"><i data-lucide="maximize-2" width="18"></i></button>
                        <div class="w-full mb-6">
                            <h3 class="text-lg font-extrabold text-stone-700 flex items-center gap-2"><i data-lucide="pie-chart" width="20" class="text-pink-400"></i> สัดส่วนค่าใช้จ่าย</h3>
                            <p class="text-sm text-stone-400 font-medium">เปอร์เซ็นต์ค่าไฟ vs ค่าน้ำ</p>
                        </div>
                        ${m.dashRecs.length > 0 ? getDonutSVG(m.elecPercent, m.totalElec, m.totalWater, m.waterPercent, false) : '<div class="flex-1 flex items-center text-stone-300 font-bold pb-10">ไม่มีข้อมูล</div>'}
                    </div>

                    <div class="bg-white p-7 rounded-[2.5rem] shadow-sm border border-pink-50 flex flex-col lg:col-span-2 relative group animate-ios-up hover:shadow-lg transition-shadow duration-500" style="animation-delay: 0.35s">
                        <button onclick="openModal('line')" class="absolute top-6 right-6 p-2.5 bg-teal-50 text-teal-500 rounded-full opacity-0 group-hover:opacity-100 transition-all duration-300 hover:bg-teal-100 hover:scale-110 active:scale-90 z-10" title="ขยายกราฟ"><i data-lucide="maximize-2" width="18"></i></button>
                        <div class="flex justify-between items-start md:items-end mb-2 flex-col md:flex-row gap-4">
                            <div>
                                <h3 class="text-lg font-extrabold text-stone-700 flex items-center gap-2"><i data-lucide="line-chart" width="20" class="text-pink-400"></i> เทียบปีต่อปี (YoY Trend)</h3>
                                <p class="text-sm text-stone-400 font-medium">เปรียบเทียบยอดรวมกับปีที่แล้ว</p>
                            </div>
                            <div class="flex items-center gap-4 text-xs font-bold text-stone-500 bg-stone-50 px-4 py-2 rounded-2xl md:mr-12 shadow-sm border border-stone-100">
                               <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-slate-300"></div> ปี ${Number(filterYear)-1}</div>
                               <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-pink-400"></div> ปี ${filterYear}</div>
                            </div>
                        </div>
                        ${getLineChartHTML(m.chartData, m.maxTotal, false, m.highestMonthVal)}
                    </div>
                </div>

                <div class="bg-white p-7 rounded-[2.5rem] shadow-sm border border-pink-50 flex flex-col relative group animate-ios-up hover:shadow-lg transition-shadow duration-500" style="animation-delay: 0.4s">
                    <button onclick="openModal('bar')" class="absolute top-6 right-6 p-2.5 bg-sky-50 text-sky-500 rounded-full opacity-0 group-hover:opacity-100 transition-all duration-300 hover:bg-sky-100 hover:scale-110 z-10" title="ขยายกราฟ"><i data-lucide="maximize-2" width="18"></i></button>
                    <div class="flex justify-between items-start md:items-end mb-8 flex-col md:flex-row gap-4">
                        <div>
                            <h3 class="text-lg font-extrabold text-stone-700 flex items-center gap-2"><i data-lucide="bar-chart-3" width="20" class="text-teal-500"></i> เปรียบเทียบหน่วยไฟ / ค่าใช้จ่าย</h3>
                            <p class="text-sm text-stone-400 font-medium">ดูพฤติกรรมการใช้ไฟ (เขียว) เทียบกับเงิน (ชมพู)</p>
                        </div>
                        <div class="flex items-center gap-4 text-xs font-bold text-stone-500 bg-stone-50 px-4 py-2 rounded-2xl md:mr-12 shadow-sm border border-stone-100">
                            <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-teal-300"></div> หน่วยไฟ</div>
                            <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-pink-300"></div> เงินรวม</div>
                            <div class="flex items-center gap-2 ml-2"><div class="w-3 h-3 rounded-full bg-rose-500 animate-pulse"></div> สูงสุด</div>
                        </div>
                    </div>
                    ${getBarChartHTML(m.chartData, m.maxUnits, m.maxTotal, false, m.highestMonthVal)}
                </div>
            </div>`;
        }

        function metricCard(title, valueStr, pct, color, icon, delay) {
            const bgLight = color==='pink'?'bg-pink-50':'bg-teal-50';
            const textCol = color==='pink'?'text-pink-400':'text-teal-400';
            let pctHtml = '';
            if(pct !== 0) {
                const isUp = pct > 0;
                const pBg = isUp ? 'bg-orange-50 text-orange-500' : 'bg-teal-50 text-teal-500';
                const pIco = isUp ? 'trending-up' : 'trending-down';
                pctHtml = `<div class="flex items-center gap-1 text-xs font-bold px-3 py-1.5 rounded-full shadow-sm ${pBg}"><i data-lucide="${pIco}" width="14"></i>${Math.abs(pct).toFixed(1)}% (MoM)</div>`;
            }
            return `
            <div class="bg-white p-5 md:p-6 rounded-[2rem] shadow-sm border border-pink-50 flex flex-col justify-between group hover:-translate-y-1 hover:shadow-xl transition-all duration-500 smooth-expo animate-ios-up" style="animation-delay: ${delay}s">
                <div class="flex justify-between items-start mb-4">
                    <div class="${bgLight} p-2.5 md:p-3 rounded-2xl ${textCol} group-hover:bg-${color}-400 group-hover:text-white transition-colors duration-300">
                        <i data-lucide="${icon}" width="20" height="20" class="transform group-hover:rotate-12 transition-transform duration-300"></i>
                    </div>
                    ${pctHtml}
                </div>
                <div>
                    <p class="text-[11px] md:text-sm font-bold text-stone-400 mb-1">${title}</p>
                    <h3 class="text-2xl md:text-3xl lg:text-4xl font-black text-stone-700 tracking-tight">${valueStr}</h3>
                </div>
            </div>`;
        }

        function getDonutSVG(elecPercent, totalElec, totalWater, waterPercent, isExpanded) {
            const sizeClasses = isExpanded ? 'w-64 h-64 md:w-80 md:h-80 scale-100' : 'w-48 h-48 hover:scale-105';
            const offset = isDrawn || isExpanded ? (251.2 - (251.2 * elecPercent) / 100) : 251.2;
            const delayCls = (isDrawn || isExpanded) ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4';
            return `
            <div class="flex flex-col items-center justify-center w-full h-full">
                <div class="relative flex items-center justify-center transition-transform duration-500 smooth-spring ${sizeClasses}">
                    <svg viewBox="0 0 100 100" class="w-full h-full transform -rotate-90 drop-shadow-md">
                        <circle cx="50" cy="50" r="40" fill="transparent" stroke="#f1f5f9" stroke-width="12" />
                        <circle id="donut-circle" cx="50" cy="50" r="40" fill="transparent" stroke="#f472b6" stroke-width="12" stroke-dasharray="251.2" stroke-dashoffset="${offset}" stroke-linecap="round" class="transition-all duration-[1500ms] smooth-expo" />
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center transition-all duration-1000 smooth-expo ${(isDrawn||isExpanded)?'opacity-100 scale-100':'opacity-0 scale-90'}">
                        <span class="${isExpanded?'text-6xl':'text-4xl'} font-black text-pink-500">${elecPercent}%</span>
                        <span class="${isExpanded?'text-lg mt-2':'text-xs mt-1'} font-bold text-stone-400">ค่าไฟ</span>
                    </div>
                </div>
                <div class="flex justify-center gap-6 w-full bg-stone-50 rounded-2xl transition-all duration-700 smooth-expo delay-300 ${delayCls} ${isExpanded?'mt-10 p-6 max-w-sm':'mt-6 p-4'} border border-stone-100">
                    <div class="flex flex-col items-center gap-1">
                        <div class="flex items-center gap-2 font-bold text-stone-600 ${isExpanded?'text-lg':'text-sm'}"><div class="w-3 h-3 rounded-full bg-pink-400"></div> ค่าไฟ</div>
                        <span class="font-bold text-stone-400 ${isExpanded?'text-lg':'text-xs'}">฿${totalElec.toLocaleString()}</span>
                    </div>
                    <div class="flex flex-col items-center gap-1">
                        <div class="flex items-center gap-2 font-bold text-stone-600 ${isExpanded?'text-lg':'text-sm'}"><div class="w-3 h-3 rounded-full bg-slate-200"></div> ค่าน้ำ</div>
                        <span class="font-bold text-stone-400 ${isExpanded?'text-lg':'text-xs'}">฿${totalWater.toLocaleString()} (${waterPercent}%)</span>
                    </div>
                </div>
            </div>`;
        }

        function getLineChartHTML(chartData, maxTotal, isExpanded, highestMonthVal) {
            const hStyle = isExpanded ? (window.innerWidth >= 768 ? '500px' : '400px') : '240px';
            const ptsCurrent = getTrendLinePoints(chartData, maxTotal, 'total');
            const ptsPrev = getTrendLinePoints(chartData, maxTotal, 'prevTotal');
            let gridHtml = [0,1,2].map(i => `<line x1="0" y1="${20+(i*70)}" x2="1000" y2="${20+(i*70)}" stroke="#f8fafc" stroke-width="2" stroke-dasharray="6 6" />`).join('');
            
            let pointsHtml = chartData.map((d, i) => {
                if(!d.hasData) return '';
                const x = 40 + (i * (920 / 11)); const y = 200 - 20 - (d.total / maxTotal) * 160;
                const oCls = (isDrawn || isExpanded) ? 'opacity-100' : 'opacity-0';
                const isHighest = d.val === highestMonthVal && d.hasData;
                const circleStroke = isHighest ? '#f43f5e' : '#f472b6';
                const circleClass = isHighest ? 'shadow-sm animate-pulse' : 'shadow-sm';

                return `<g class="group hover:scale-[1.3] transition-all duration-500 smooth-spring origin-center cursor-pointer ${oCls}" style="transform-origin: ${x}px ${y}px; transition-delay: ${(isDrawn||isExpanded)?i*50:0}ms">
                    <circle cx="${x}" cy="${y}" r="${isExpanded?12:8}" fill="#fff" stroke="${circleStroke}" stroke-width="${isExpanded?6:4}" class="${circleClass} pointer-events-auto" />
                    <text x="${x}" y="${y-(isExpanded?30:20)}" text-anchor="middle" fill="${isHighest ? '#f43f5e' : '#f472b6'}" font-size="${isExpanded?24:16}" font-weight="bold" class="opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 drop-shadow-sm pointer-events-none">฿${d.total}</text>
                </g>`;
            }).join('');

            let labelsHtml = chartData.map(d => `<span class="text-[10px] md:text-sm font-bold transition-all duration-300 ${d.hasData && d.isActive ? 'text-pink-500 bg-pink-50 px-2 py-1 rounded-lg scale-110' : (d.hasData ? 'text-stone-500' : 'text-stone-300')}">${d.month}</span>`).join('');

            const lineOp = (isDrawn || isExpanded) ? 'opacity-100 stroke-dashoffset-0' : 'opacity-0';
            const prevLineOp = (isDrawn || isExpanded) ? 'opacity-60 stroke-dashoffset-0' : 'opacity-0';
            
            return `
            <div class="w-full relative group flex flex-col" style="height: ${hStyle};">
                <div class="absolute left-0 top-0 bottom-6 flex flex-col justify-between text-[10px] text-stone-300 font-bold z-0 pb-4 pointer-events-none">
                    <span>฿${maxTotal}</span><span>฿${Math.round(maxTotal/2)}</span><span>0</span>
                </div>
                <svg viewBox="0 0 1000 200" class="w-full flex-1 overflow-visible ml-6 mt-4 pointer-events-none" preserveAspectRatio="none">
                    ${gridHtml}
                    <polyline points="${ptsPrev}" fill="none" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" class="transition-all smooth-expo ${prevLineOp}" style="stroke-dasharray: 2000; stroke-dashoffset: ${(isDrawn||isExpanded)?0:2000}; transition-duration: 1.5s;" />
                    <polyline points="${ptsCurrent}" fill="none" stroke="#f472b6" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" class="transition-all smooth-expo drop-shadow-sm ${lineOp}" style="stroke-dasharray: 2000; stroke-dashoffset: ${(isDrawn||isExpanded)?0:2000}; transition-duration: 1.5s;" />
                    ${pointsHtml}
                </svg>
                <div class="flex justify-between items-end h-8 ml-6 px-1 mt-4 transition-opacity duration-700 delay-300 ${(isDrawn||isExpanded)?'opacity-100':'opacity-0'} pointer-events-none">
                    ${labelsHtml}
                </div>
            </div>`;
        }

        function getBarChartHTML(chartData, maxUnits, maxTotal, isExpanded, highestMonthVal) {
            const hStyle = isExpanded ? (window.innerWidth >= 768 ? '500px' : '400px') : '260px';
            const innerHStyle = isExpanded ? (window.innerWidth >= 768 ? '400px' : '320px') : '220px';
            const wCls = isExpanded ? 'w-6 sm:w-8 lg:w-12' : 'w-3 sm:w-5 lg:w-8';
            
            let barsHtml = chartData.map((d, idx) => {
                const uH = d.hasData ? Math.max((d.units / maxUnits) * 100, 4) : 0; 
                const tH = d.hasData ? Math.max((d.total / maxTotal) * 100, 4) : 0; 
                const activeCls = d.isActive ? 'opacity-100 hover:scale-105' : 'opacity-40';
                
                const isHighest = d.val === highestMonthVal && d.hasData;
                const totalBarColor = isHighest ? 'bg-rose-400 group-hover:bg-rose-500 shadow-rose-200' : 'bg-pink-300 group-hover:bg-pink-400';
                const highlightIcon = (isHighest && (isDrawn||isExpanded)) ? `<div class="absolute -top-10 text-rose-500 animate-bounce drop-shadow-sm pointer-events-none transition-all duration-300"><i data-lucide="flame" width="24"></i></div>` : '';

                let tooltip = d.hasData ? `<div class="opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 smooth-spring absolute ${isExpanded?'-top-20':'-top-16'} left-1/2 -translate-x-1/2 bg-white border border-pink-100 text-stone-600 text-xs py-2 px-4 rounded-2xl pointer-events-none whitespace-nowrap z-30 shadow-xl shadow-pink-100/50 flex flex-col items-center gap-1 transform scale-90 group-hover:scale-100"><span class="font-extrabold text-pink-400 ${isExpanded?'text-base':''}">${d.fullMonth}</span><div class="flex gap-4 ${isExpanded?'text-sm':''}"><span class="text-teal-500 font-bold">${d.units} หน่วย</span><span class="text-pink-500 font-bold">฿${d.total.toLocaleString()}</span></div></div>` : '';

                return `
                <div class="flex-1 flex flex-col items-center justify-end h-full relative group z-10 hover:z-[100] transition-all duration-500 smooth-expo ${activeCls}">
                    ${tooltip}
                    ${highlightIcon}
                    <div class="w-full flex items-end justify-center gap-0.5 sm:gap-1.5" style="height: ${innerHStyle};">
                        <div class="rounded-t-full transition-all smooth-expo shadow-sm ${wCls} ${d.hasData?'bg-teal-300 group-hover:bg-teal-400':'bg-transparent'}" style="height: ${(isDrawn||isExpanded)?uH:0}%; transition-delay: ${idx*30}ms; transition-duration: 1.2s;"></div>
                        <div class="rounded-t-full transition-all smooth-expo shadow-sm ${wCls} ${d.hasData?totalBarColor:'bg-transparent'}" style="height: ${(isDrawn||isExpanded)?tH:0}%; transition-delay: ${(idx*30)+100}ms; transition-duration: 1.2s;"></div>
                    </div>
                    <span class="text-[10px] md:text-xs font-bold mt-4 transition-all duration-500 delay-500 ${(isDrawn||isExpanded)?'opacity-100':'opacity-0'} ${d.hasData&&d.isActive?(isHighest?'text-rose-600 bg-rose-50':'text-stone-600 bg-stone-100')+' px-2 py-1 rounded-full':'text-stone-300'}">${d.month}</span>
                </div>`;
            }).join('');

            return `
            <div class="w-full flex items-end gap-1.5 md:gap-4 relative border-b-2 border-stone-50 pb-2 mt-4" style="height: ${hStyle};">
                <div class="absolute inset-0 flex flex-col justify-between pointer-events-none pb-8 z-0">
                    <div class="border-t border-stone-50 w-full"></div><div class="border-t border-stone-50 w-full"></div>
                    <div class="border-t border-stone-50 w-full"></div><div class="border-t border-stone-50 w-full"></div>
                </div>
                ${barsHtml}

        async function startCamera() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                console.warn("Media devices not supported");
                showCustomAlert("อุปกรณ์หรือเบราว์เซอร์ของคุณไม่รองรับการใช้งานกล้อง หรือไม่ได้รันผ่าน HTTPS/Localhost", "error");
                return;
            }
            try {
                if (stream) stopCamera();
                const constraints = { video: { facingMode: { ideal: currentFacingMode }, width: { ideal: 1920 }, height: { ideal: 1080 } } };
                const mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
                stream = mediaStream;
                const video = document.getElementById('cam-video');
                if(video) video.srcObject = stream;

                videoTrack = stream.getVideoTracks()[0];
                const capabilities = videoTrack.getCapabilities();
                hasTorch = !!capabilities.torch;
                
                const btnTorch = document.getElementById('btn-torch');
                if (btnTorch) {
                    if (hasTorch && currentFacingMode === 'environment') btnTorch.classList.remove('hidden');
                    else { btnTorch.classList.add('hidden'); isTorchOn = false; }
                }
            } catch (err) { 
                console.log("Camera error", err);
                try {
                    const fallbackStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    stream = fallbackStream;
                    const video = document.getElementById('cam-video');
                    if(video) video.srcObject = stream;
                } catch(e) {
                    try {
                        const basicStream = await navigator.mediaDevices.getUserMedia({ video: true });
                        stream = basicStream;
                        const video = document.getElementById('cam-video');
                        if(video) video.srcObject = stream;
                    } catch(fallbackErr) { console.error("Camera completely failed", fallbackErr); }
                }
            }
        }

        function stopCamera() {
            if (stream) { stream.getTracks().forEach(track => track.stop()); stream = null; videoTrack = null; }
            isTorchOn = false;
        }

        async function toggleTorch() {
            if (videoTrack && hasTorch) {
                isTorchOn = !isTorchOn;
                try {
                    await videoTrack.applyConstraints({ advanced: [{ torch: isTorchOn }] });
                    const icon = document.getElementById('icon-torch');
                    if (icon) {
                        if (isTorchOn) icon.classList.add('text-yellow-400', 'fill-yellow-400');
                        else icon.classList.remove('text-yellow-400', 'fill-yellow-400');
                    }
                } catch (e) { console.log("Torch error", e); }
            }
        }

        function switchCamera() { currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment'; startCamera(); }

        function takePhoto() {
            const video = document.getElementById('cam-video');
            const canvas = document.getElementById('cam-canvas');
            const preview = document.getElementById('cam-preview');
            if(video && canvas && video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.filter = 'contrast(1.15) brightness(1.05)';
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                preview.src = canvas.toDataURL('image/jpeg', 0.9);
                isPhotoTaken = true; currentZoom = 1;
                if(document.getElementById('zoom-slider')) document.getElementById('zoom-slider').value = 1;
                updateZoom(1); stopCamera(); updateCamUI();
            }
        }

        function retakePhoto() { isPhotoTaken = false; startCamera(); updateCamUI(); }

        function updateZoom(val) {
            currentZoom = val;

        }

            const elTopCtrl = document.getElementById('cam-top-controls'), elBtnRetake = document.getElementById('cam-btn-retake');

            if(elCamVideo) elCamVideo.classList.toggle('hidden', isPhotoTaken);
            if(elPreviewArea) elPreviewArea.classList.toggle('hidden', !isPhotoTaken);
            if(elOverlay) elOverlay.classList.toggle('hidden', isPhotoTaken);
            if(elBtnCap) elBtnCap.classList.toggle('hidden', isPhotoTaken);
            if(elTopCtrl) elTopCtrl.classList.toggle('hidden', isPhotoTaken);

        function autoFillPrevMeter() {
            let prevM = Number(formState.month) - 1; let prevY = Number(formState.year);
            if(prevM === 0) { prevM = 12; prevY -= 1; }
            const prevMStr = String(prevM).padStart(2, '0');
            const prevRec = records.find(r => String(r.month).padStart(2, '0') === prevMStr && String(r.year) === String(prevY));
            const prevInput = document.getElementById('f-prev');
            const hint = document.getElementById('auto-fill-hint');
            
            if(prevRec && prevInput) {
                prevInput.value = prevRec.elecCurr; formState.elecPrev = prevRec.elecCurr;
                if(hint) { hint.classList.remove('hidden'); hint.classList.add('flex'); hint.classList.remove('animate-ios-pop'); void hint.offsetWidth; hint.classList.add('animate-ios-pop'); }
            } else {
                if(prevInput) { prevInput.value = ''; formState.elecPrev = ''; }
                if(hint) { hint.classList.add('hidden'); hint.classList.remove('flex'); }
            }
            updateCalc();
        }

        function updateCalc() {
            const elPrev = document.getElementById('f-prev'), elCurr = document.getElementById('f-curr');
            const elRate = document.getElementById('f-rate');
            
            if(elPrev) formState.elecPrev = elPrev.value; if(elCurr) formState.elecCurr = elCurr.value;
            if(elRate) formState.elecRate = Number(elRate.value); 

            const elecUnits = (Number(formState.elecCurr)||0) - (Number(formState.elecPrev)||0);
            const elecTot = elecUnits > 0 ? elecUnits * formState.elecRate : 0;
            
            let waterTot = 0;
            if (formState.waterType === 'flat') {
                const wFlat = document.getElementById('f-water-flat');
                if (wFlat) formState.waterTotal = Number(wFlat.value);
                waterTot = formState.waterTotal || 0;
            } else {
                const wPrev = document.getElementById('f-water-prev'), wCurr = document.getElementById('f-water-curr'), wRate = document.getElementById('f-water-rate');
                if (wPrev) formState.waterPrev = wPrev.value;
                if (wCurr) formState.waterCurr = wCurr.value;
                if (wRate) formState.waterRate = Number(wRate.value);
                
                const wUnits = (Number(formState.waterCurr)||0) - (Number(formState.waterPrev)||0);
                waterTot = wUnits > 0 ? wUnits * formState.waterRate : 0;
                formState.waterTotal = waterTot; 

                const elWUnits = document.getElementById('calc-water-units');
                const elWTot = document.getElementById('calc-water-total');
                if (elWUnits) elWUnits.innerText = wUnits > 0 ? wUnits : 0;
                if (elWTot) elWTot.innerText = `฿${waterTot.toLocaleString()}`;
            }

            const grandTot = elecTot + waterTot;

            const elUnits = document.getElementById('calc-units'), elElec = document.getElementById('calc-elec'), elGrand = document.getElementById('calc-grand');
            if(elUnits) elUnits.innerText = elecUnits > 0 ? elecUnits : 0;
            if(elElec) elElec.innerText = `฿${elecTot.toLocaleString()}`;
            if(elGrand) elGrand.innerText = `฿${grandTot.toLocaleString()}`;
        }

        async function submitForm(e) {
            e.preventDefault();

            if(!prev || !curr) return showCustomAlert("กรุณากรอกหน่วยไฟให้ครบถ้วนนะครับ", "warning");
            const units = curr - prev;
            if(units < 0) return showCustomAlert("หน่วยไฟเดือนนี้ ต้องมากกว่าหน่วยเดือนก่อนนะครับ", "error");

        function exportReportCSV() {
            let filtered = [...records].filter(r => String(r.year) === String(repYear));
            if (repPeriod === 'specific') filtered = filtered.filter(r => String(r.month).padStart(2, '0') === String(repMonth).padStart(2, '0'));
            else if (repPeriod === 'latest3') { const uniqueMonths = [...new Set(filtered.map(r => String(r.month).padStart(2, '0')))].sort().reverse().slice(0, 3); filtered = filtered.filter(r => uniqueMonths.includes(String(r.month).padStart(2, '0'))); }
            filtered.sort((a, b) => b.month - a.month);
            if(filtered.length === 0) return showCustomAlert('ไม่มีข้อมูลสำหรับ Export ครับ', 'warning');
            
            const headers = ['รหัสบิล', 'เดือน', 'ปี', 'วันที่บันทึก', 'จดไฟก่อน', 'จดไฟหลัง', 'หน่วยไฟ', 'เรทไฟ', 'รวมค่าไฟ', 'ประเภทน้ำ', 'จดน้ำก่อน', 'จดน้ำหลัง', 'เรทน้ำ', 'รวมค่าน้ำ', 'ยอดสุทธิ'];
            const rows = filtered.map(r => [
                r.id,
                THAI_MONTHS.find(m => m.val === String(r.month).padStart(2, '0'))?.label || r.month, 
                r.year, 
                formatThaiDate(r.date),
                r.elecPrev, r.elecCurr, r.elecUnits, r.elecRate, r.elecTotal, 
                r.waterType === 'meter' ? 'ตามมิเตอร์' : 'เหมาจ่าย', 
                r.waterPrev || '', r.waterCurr || '', r.waterRate || '', r.waterTotal, 
                r.total
            ]);
            
            const csvContent = "\uFEFF" + headers.join(",") + "\n" + rows.map(e => e.join(",")).join("\n");
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a"); link.setAttribute("href", url); link.setAttribute("download", `MyRoom_Report_${repYear}.csv`); document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }

        async function saveUserDetails(userId, oldUsername) {
            const newUsernameInput = document.getElementById('edit-username-input');
            const newPasswordInput = document.getElementById('edit-password-input');
            
            if (!newUsernameInput) return;
            
            const newUsername = newUsernameInput.value.trim();
            const newPassword = newPasswordInput ? newPasswordInput.value.trim() : '';
            
            if(!newUsername) {
                return showCustomAlert('กรุณากรอกชื่อผู้ใช้ด้วยครับ', 'warning');
            }
            
            if(newUsername !== oldUsername && usersList.some(u => String(u.username).toLowerCase() === String(newUsername).toLowerCase())) {
                return showCustomAlert('ชื่อผู้ใช้นี้มีในระบบแล้วครับ', 'error');
            }

            const btn = document.getElementById('btn-save-userdetails');
            const btnText = document.getElementById('btn-save-userdetails-text');
            
            if (btn) { btn.disabled = true; btn.classList.add('opacity-70'); }
            if (btnText) btnText.innerHTML = '<i data-lucide="loader-2" class="animate-spin inline-block" width="18"></i> กำลังบันทึก...';
            if (typeof lucide !== 'undefined') lucide.createIcons();

            try {
                if(typeof GOOGLE_SCRIPT_URL !== 'undefined' && !GOOGLE_SCRIPT_URL.includes("YOUR_APP_SCRIPT_URL")) {
                    const response = await fetch(GOOGLE_SCRIPT_URL, { 
                        method: 'POST', 
                        body: JSON.stringify({ 
                            action: 'updateUserCredentials', 
                            oldUsername: oldUsername, 
                            newUsername: newUsername, 
                            newPassword: newPassword 
                        }), 
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                    });
                    
                    const result = await response.json();
                    if (result.status !== 'success') {
                        throw new Error(result.message || 'อัปเดตข้อมูลไม่สำเร็จ');
                    }
                }
                
                const userIndex = usersList.findIndex(u => u.id === userId);
                if(userIndex > -1) {
                    usersList[userIndex].username = newUsername;
                    if (newPassword) {
                        usersList[userIndex].password = newPassword;
                    }
                }

                if(typeof currentUser !== 'undefined' && currentUser.username === oldUsername) {
                    currentUser.username = newUsername;
                    const savedInfo = JSON.parse(localStorage.getItem('user_info') || sessionStorage.getItem('user_info'));
                    if(savedInfo) {
                        savedInfo.username = newUsername;
                        if(localStorage.getItem('user_info')) localStorage.setItem('user_info', JSON.stringify(savedInfo));
                        else sessionStorage.setItem('user_info', JSON.stringify(savedInfo));
                    }
                }

                showCustomAlert('แก้ไขข้อมูลบัญชีสำเร็จ! ✨', 'success');
                closeModal();
                if(typeof renderApp === 'function') renderApp();
                if(typeof updateProfileUI === 'function') updateProfileUI();
            } catch(e) {
                showCustomAlert(e.message || 'อัปเดตไม่สำเร็จ ลองใหม่อีกครั้งครับ', 'error');
                if (btn) { btn.disabled = false; btn.classList.remove('opacity-70'); }
                if (btnText) btnText.innerHTML = 'บันทึก';
            }
        }

            const wMeterHidden = editState.waterType === 'meter' ? '' : 'hidden';

            const btnMeterCls = editState.waterType === 'meter' ? 'bg-teal-500 text-white' : 'bg-teal-100 text-teal-600 hover:bg-teal-200';

                <div class="flex flex-col w-full max-w-2xl mx-auto pb-4">
                    <h2 class="text-3xl font-black text-stone-800 mb-2 flex items-center gap-3"><i data-lucide="pencil" class="text-sky-500" width="28" height="28"></i> แก้ไขข้อมูลบิล</h2>

                    <form id="edit-form" onsubmit="submitEdit(event, '${id}')" class="space-y-6">
